<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Loading...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root { --ink:#fff; --black:#000; }
    * { box-sizing: border-box; }

    body{
      margin:0;
      background:#000;
      color:#fff;
      font-family: Arial, Helvetica, sans-serif;
      min-height:100vh;
    }

    .top-banner{
      width:100%;
      background:#000;
      aspect-ratio: 8 / 1;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:56px;
    }

    .top-banner img{
      height:82%;
      max-width:90vw;
      object-fit:contain;
    }

    .stage{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:3rem 1rem;
    }

    .wrap{
      text-align:center;
      max-width:700px;
      width:100%;
    }

    .spinner{
      width:56px;
      height:56px;
      border:6px solid #333;
      border-top-color:#fff;
      border-radius:50%;
      margin:0 auto 1rem;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .txt{ font-size:1rem; }
    .sub{ opacity:0.7; margin-top:0.4rem; font-size:0.9rem; }

    .err{
      display:none;
      margin-top:1rem;
      background:#111;
      padding:1rem;
      border-radius:10px;
      border:1px solid #333;
      text-align:left;
      font-size:0.9rem;
      white-space:pre-wrap;
    }
  </style>
</head>

<body>

  <div class="top-banner">
    <a href="index.html">
      <img src="White Logo.jpg" alt="League Logo">
    </a>
  </div>

  <div class="stage">
    <div class="wrap">
      <div class="spinner"></div>
      <div class="txt">Preparing your secure checkout…</div>
      <div class="sub">One moment. You’ll be redirected automatically.</div>
      <div class="err" id="errBox"></div>
    </div>
  </div>

  <script>
    (async function () {

      const BACKEND_URL = "https://hff-server.onrender.com";
      const errBox = document.getElementById('errBox');

      function showError(msg) {
        errBox.style.display = 'block';
        errBox.textContent = msg;
      }

      function getPayload() {
        return (
          sessionStorage.getItem('HFF_CHECKOUT_PAYLOAD') ||
          localStorage.getItem('HFF_CHECKOUT_PAYLOAD')
        );
      }

      const raw = getPayload();

      if (!raw) {
        window.location.replace('cart.html');
        return;
      }

      let parsed;
      try {
        parsed = JSON.parse(raw);
      } catch {
        window.location.replace('cart.html');
        return;
      }

      const isRegistration =
        parsed.type === 'registration' ||
        (parsed.data && parsed.data.flow === 'adult_flag');

      let body;

      if (isRegistration) {

        const reg = parsed.data || parsed;

        const isAdultFlag = reg.flow === 'adult_flag';

        let fee = 185;
        let name = "Registration";

        if (isAdultFlag) {
          fee = Number(reg.price || (reg.wantsJersey ? 80 : 30));

          name = reg.wantsJersey
            ? "Adult Flag Registration (With Jersey)"
            : "Adult Flag Registration (No Jersey)";
        } else {
          const ageGroup = reg.ageGroup;
          fee = (ageGroup === 'U6') ? 80 : 185;
          name = "Player Registration";
        }

        const playerName =
          reg.player
            ? ((reg.player.firstName || '') + ' ' + (reg.player.lastName || '')).trim()
            : 'Registration';

        body = {
          cart: [{
            name: name,
            price: fee,
            quantity: 1
          }],
          athleteName: playerName,
          registration: reg,
          teamToken: reg.teamToken || null,
          successUrl: window.location.origin + '/success.html?session_id={CHECKOUT_SESSION_ID}',
          cancelUrl: window.location.origin + '/register.html'
        };

      } else {

        body = {
          cart: parsed.cart,
          athleteName: parsed.athleteName || '',
          successUrl: window.location.origin + '/cart_success.html?session_id={CHECKOUT_SESSION_ID}',
          cancelUrl: window.location.origin + '/cart.html'
        };
      }

      try {

        const res = await fetch(BACKEND_URL + '/create-checkout-session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        const text = await res.text();

        if (!res.ok) {
          throw new Error(text);
        }

        const out = JSON.parse(text);
        const url = out.url;

        if (!url) {
          throw new Error("No Stripe URL returned.");
        }

        window.location.href = url;

      } catch (e) {

        showError("Checkout failed:\n\n" + e.message);

        setTimeout(() => {
          window.location.replace('cart.html');
        }, 4000);
      }

    })();
  </script>

</body>
</html>
