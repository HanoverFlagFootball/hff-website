<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Adult Flag Registration</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#000;
  color:#fff;
}

.wrap{
  max-width:900px;
  margin:auto;
  background:#fff;
  color:#000;
  padding:20px;
}

h1{text-align:center;}

.form-row{margin-bottom:12px;}

label{display:block;font-size:14px;margin-bottom:4px;}

input, select, textarea{
  width:100%;
  padding:8px;
}

.radio-group{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.disabled{
  background:#eee;
  color:#777;
}

button{
  padding:10px 20px;
  background:#0b5ed7;
  color:#fff;
  border:none;
  border-radius:20px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="wrap">

<h1>Adult Flag Registration</h1>

<p style="text-align:center;">
Choose <strong>$80 with jersey</strong> or <strong>$30 without jersey</strong>
</p>

<form id="form">

<!-- Jersey choice -->
<div class="form-row">
  <label>Registration Option *</label>
  <div class="radio-group">
    <label><input type="radio" name="jersey" value="yes"> With Jersey ($80)</label>
    <label><input type="radio" name="jersey" value="no"> No Jersey ($30)</label>
  </div>
</div>

<!-- Player -->
<div class="form-row">
  <label>First Name *</label>
  <input id="first" required>
</div>

<div class="form-row">
  <label>Last Name *</label>
  <input id="last" required>
</div>

<div class="form-row">
  <label>Email *</label>
  <input id="email" required>
</div>

<div class="form-row">
  <label>Phone *</label>
  <input id="phone" required>
</div>

<div class="form-row">
  <label>Date of Birth *</label>
  <input type="date" id="dob" required>
</div>

<div class="form-row">
  <label>Jersey Size *</label>
  <select id="size">
    <option value="">Select</option>
    <option>AS</option>
    <option>AM</option>
    <option>AL</option>
    <option>AXL</option>
  </select>
</div>

<div class="form-row">
  <label>Health Notes</label>
  <textarea id="health"></textarea>
</div>

<div style="text-align:center;margin-top:20px;">
  <button type="submit">Continue to Payment</button>
</div>

</form>

</div>

<script>

// detect team
const params = new URLSearchParams(window.location.search);
const team = params.get('team');

if(!team){
  alert("This page must be opened using a team or solo link.");
}

// jersey toggle
const jerseyRadios = document.querySelectorAll('input[name="jersey"]');
const sizeField = document.getElementById('size');

function updateJersey(){
  const selected = document.querySelector('input[name="jersey"]:checked');
  if(!selected) return;

  if(selected.value === "no"){
    sizeField.disabled = true;
    sizeField.classList.add("disabled");
    sizeField.value = "";
  } else {
    sizeField.disabled = false;
    sizeField.classList.remove("disabled");
  }
}

jerseyRadios.forEach(r => r.addEventListener('change', updateJersey));

// submit
document.getElementById('form').addEventListener('submit', function(e){

  e.preventDefault();

  const jersey = document.querySelector('input[name="jersey"]:checked');
  if(!jersey){
    alert("Select jersey option");
    return;
  }

  if(jersey.value === "yes" && !sizeField.value){
    alert("Select jersey size");
    return;
  }

  const wantsJersey = jersey.value === "yes";
  const price = wantsJersey ? 80 : 30;

  const payload = {
    type:"registration",
    data:{
      flow:"adult_flag",
      teamToken: team,
      wantsJersey: wantsJersey,
      price: price,
      player:{
        firstName: document.getElementById('first').value,
        lastName: document.getElementById('last').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        dob: document.getElementById('dob').value,
        shirtSize: wantsJersey ? sizeField.value : ""
      }
    }
  };

  sessionStorage.setItem("HFF_CHECKOUT_PAYLOAD", JSON.stringify(payload));
  localStorage.setItem("HFF_CHECKOUT_PAYLOAD", JSON.stringify(payload));

  window.location.href = "loading.html";
});
</script>

</body>
</html>
