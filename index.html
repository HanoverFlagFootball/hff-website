<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Flag Football League</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --ink: #fff;
      --line: #333;
      --black: #000;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: var(--ink);
    }

    /* =========================
       3 COLUMNS
       ========================= */
    .three-cols {
      display: grid;
      grid-template-columns: 1.2fr 2.6fr 1.2fr;
      gap: 2px;
      padding: 1.2vw 2vw 2vw;
      background: #000;
    }

    .col {
      background: #fff;
      color: #000;
      border: 1px solid #333;
      padding: 1.2vw;
    }

    /* 🔥 LEFT COLUMN FIX */
    .left-col {
      padding-top: 0;
    }

    .left-col .register-btn {
      display: block;
      width: calc(100% + 2.4vw);
      margin: -1.2vw -1.2vw 0.6vw -1.2vw;
    }

    .left-col .register-btn img {
      width: 100%;
      height: auto;
      display: block;
    }

    .left-col h2 {
      margin-top: 0;
    }

    /* SHOP ITEMS */
    .left-col .shop-item {
      display: flex;
      align-items: center;
      gap: 0.6vw;
      text-decoration: none;
      color: #000;
      margin-bottom: 1.2vw;
    }

    .left-col .shop-item img {
      width: 50px;
      height: 50px;
      object-fit: contain;
    }

    .left-col .shop-item span {
      font-weight: 600;
    }

    /* CENTER */
    .center-col h2 {
      margin-top: 0;
      text-align: center;
    }

    .news-item {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 1vw;
      margin-bottom: 1.2vw;
    }

    .news-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* RIGHT */
    .right-col h3 {
      margin-top: 0;
      text-align: center;
    }

    /* MOBILE */
    @media (max-width: 1050px) {
      .three-cols { grid-template-columns: 1fr; }
      .center-col { order: 1; }
      .left-col { order: 2; }
      .right-col { order: 3; }
    }
  </style>
</head>

<body>

  <section class="three-cols">

    <!-- LEFT -->
    <div class="col left-col">

      <!-- 🔥 BIG BUTTON -->
      <a href="adult_team_create.html" class="register-btn">
        <img src="adult_reg.png" alt="Adult Registration">
      </a>

      <h2>Important Dates</h2>
      <p>Saturday, May 16th - Week 1</p>
      <p>Saturday, July 4th - Playoffs</p>

      <h3>Shop NFL Flag Gear</h3>

      <a href="shop.html" class="shop-item">
        <img src="gloves.png">
        <span>Team Gloves</span>
      </a>

      <a href="shop.html" class="shop-item">
        <img src="headband.png">
        <span>Team Headband</span>
      </a>

    </div>

    <!-- CENTER -->
    <div class="col center-col">
      <h2>Announcements & News</h2>

      <div class="news-item">
        <img src="AdultFlag.jpeg">
        <div>
          <h3>Adult Tournament (16+)</h3>
          <p>July 11 — Bring your own team or sign up solo.</p>
        </div>
      </div>

    </div>

    <!-- RIGHT -->
    <div class="col right-col">
      <h3>Past Announcements</h3>
    </div>

  </section>

</body>
</html>
