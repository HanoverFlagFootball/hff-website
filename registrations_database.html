<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrations Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#0b0b0b;
      --panel:#151515;
      --panel-2:#1d1d1d;
      --line:#2d2d2d;
      --text:#f5f5f5;
      --muted:#b8b8b8;
      --accent:#d4af37;
      --green:#1f8f4e;
      --red:#b33a3a;
      --blue:#2b6cb0;
      --input:#101010;
    }

    * { box-sizing: border-box; }

    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width: 1600px;
      margin: 0 auto;
      padding: 20px;
    }

    h1{
      margin:0 0 16px;
      font-size: 28px;
      color: var(--accent);
    }

    .topbar{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:center;
      justify-content:space-between;
      margin-bottom:16px;
    }

    .controls{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px;
      box-shadow: 0 8px 30px rgba(0,0,0,.25);
    }

    input[type="text"],
    input[type="search"],
    input[type="date"],
    select{
      background:var(--input);
      color:var(--text);
      border:1px solid #3a3a3a;
      border-radius:10px;
      padding:10px 12px;
      min-height:40px;
    }

    button{
      background:var(--accent);
      color:#111;
      border:none;
      border-radius:10px;
      padding:10px 14px;
      font-weight:700;
      cursor:pointer;
    }

    button.secondary{
      background:#2a2a2a;
      color:var(--text);
      border:1px solid #404040;
    }

    button:hover{
      opacity:.95;
    }

    .status{
      margin:10px 0 14px;
      padding:10px 12px;
      border-radius:10px;
      font-size:14px;
      display:none;
    }

    .status.show{ display:block; }
    .status.ok{ background:rgba(31,143,78,.15); border:1px solid rgba(31,143,78,.45); color:#b7f0c9; }
    .status.err{ background:rgba(179,58,58,.15); border:1px solid rgba(179,58,58,.45); color:#ffd0d0; }
    .status.info{ background:rgba(43,108,176,.15); border:1px solid rgba(43,108,176,.45); color:#d7e9ff; }

    .table-wrap{
      overflow:auto;
      border-radius:14px;
      border:1px solid var(--line);
      background:var(--panel);
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:1400px;
    }

    th, td{
      padding:12px 10px;
      border-bottom:1px solid var(--line);
      text-align:left;
      vertical-align:top;
      font-size:14px;
    }

    th{
      position:sticky;
      top:0;
      background:var(--panel-2);
      z-index:1;
      color:var(--accent);
      white-space:nowrap;
    }

    tr:hover td{
      background:rgba(255,255,255,.02);
    }

    .small{
      font-size:12px;
      color:var(--muted);
    }

    .pill{
      display:inline-block;
      padding:4px 8px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
    }

    .pill.source-order{
      background:rgba(43,108,176,.18);
      border:1px solid rgba(43,108,176,.45);
      color:#d7e9ff;
    }

    .pill.source-saved{
      background:rgba(31,143,78,.18);
      border:1px solid rgba(31,143,78,.45);
      color:#b7f0c9;
    }

    .pill.source-blank{
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.12);
      color:#ddd;
    }

    .cell-input{
      width:100%;
      min-width:90px;
      padding:8px 10px;
      border-radius:8px;
      background:#0d0d0d;
      color:#fff;
      border:1px solid #3b3b3b;
    }

    .cell-input.saving{
      border-color:#2b6cb0;
      box-shadow:0 0 0 2px rgba(43,108,176,.18);
    }

    .cell-input.saved{
      border-color:#1f8f4e;
      box-shadow:0 0 0 2px rgba(31,143,78,.18);
    }

    .cell-input.error{
      border-color:#b33a3a;
      box-shadow:0 0 0 2px rgba(179,58,58,.18);
    }

    .muted{
      color:var(--muted);
    }

    .right{
      text-align:right;
    }

    .nowrap{
      white-space:nowrap;
    }

    .name-block{
      display:flex;
      flex-direction:column;
      gap:3px;
    }

    .toolbar-note{
      color:var(--muted);
      font-size:13px;
    }

    .count{
      font-weight:700;
      color:var(--accent);
    }

    @media (max-width: 900px){
      .topbar{
        flex-direction:column;
        align-items:stretch;
      }

      .controls{
        width:100%;
      }

      .controls > *{
        flex:1 1 180px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>Registrations Admin</h1>
        <div class="toolbar-note">
          Jersey Size is editable and will pre-fill from matching order data when available.
        </div>
      </div>

      <div class="controls">
        <input type="search" id="searchInput" placeholder="Search name, email, team, division..." />
        <button id="refreshBtn">Refresh</button>
      </div>
    </div>

    <div id="statusBox" class="status"></div>

    <div class="card" style="margin-bottom: 14px;">
      <span>Total registrations shown: <span id="rowCount" class="count">0</span></span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="nowrap">Created</th>
            <th>Name</th>
            <th>Email</th>
            <th class="nowrap">DOB</th>
            <th>Division</th>
            <th>Team</th>
            <th class="nowrap">Jersey Size</th>
            <th>Source</th>
            <th>Buddy Request</th>
            <th>Phone</th>
            <th>Medical Notes</th>
            <th class="nowrap">Photo Permission</th>
            <th class="nowrap">Waiver</th>
          </tr>
        </thead>
        <tbody id="registrationsBody">
          <tr>
            <td colspan="13" class="muted">Loading registrations...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    // =========================
    // SUPABASE SETTINGS
    // =========================
    const SUPABASE_URL = "https://wnhzgxnwlmohfldnhhyt.supabase.co";
    const SUPABASE_ANON_KEY = "YOURsb_publishable_x5Xkl7tfpUwhz_ENftiaqQ_am915vqY";

    const REGISTRATIONS_TABLE = "registration_tracking_v1";
    const ORDERS_TABLE = "orders";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const statusBox = document.getElementById("statusBox");
    const registrationsBody = document.getElementById("registrationsBody");
    const searchInput = document.getElementById("searchInput");
    const refreshBtn = document.getElementById("refreshBtn");
    const rowCount = document.getElementById("rowCount");

    let allRows = [];

    function showStatus(message, type = "info") {
      statusBox.textContent = message;
      statusBox.className = `status show ${type}`;
    }

    function clearStatus() {
      statusBox.textContent = "";
      statusBox.className = "status";
    }

    function safeLower(value) {
      return String(value || "").trim().toLowerCase();
    }

    function normalizeDate(value) {
      if (!value) return "";
      const d = new Date(value);
      if (isNaN(d.getTime())) return String(value).slice(0, 10);
      return d.toISOString().slice(0, 10);
    }

    function makeKey(firstName, lastName, dob, email = "") {
      return [
        safeLower(firstName),
        safeLower(lastName),
        normalizeDate(dob),
        safeLower(email)
      ].join("|");
    }

    function makeKeyNoEmail(firstName, lastName, dob) {
      return [
        safeLower(firstName),
        safeLower(lastName),
        normalizeDate(dob)
      ].join("|");
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatDate(value) {
      if (!value) return "";
      const d = new Date(value);
      if (isNaN(d.getTime())) return String(value).slice(0, 10);
      return d.toLocaleDateString();
    }

    function getRegistrationName(row) {
      const first =
        row.first_name ||
        row.firstname ||
        row.player_first_name ||
        "";
      const last =
        row.last_name ||
        row.lastname ||
        row.player_last_name ||
        "";
      return `${first} ${last}`.trim();
    }

    function getRegistrationEmail(row) {
      return (
        row.email ||
        row.parent_email ||
        row.guardian_email ||
        row.stripe_customer_email ||
        ""
      );
    }

    function getRegistrationDob(row) {
      return (
        row.date_of_birth ||
        row.dob ||
        row.player_date_of_birth ||
        ""
      );
    }

    function getRegistrationDivision(row) {
      return (
        row.division ||
        row.age_group ||
        row.program ||
        row.registration_type ||
        ""
      );
    }

    function getRegistrationTeam(row) {
      return (
        row.team ||
        row.team_name ||
        row.team_code ||
        ""
      );
    }

    function getBuddyRequest(row) {
      return (
        row.buddy_request ||
        row.buddy ||
        ""
      );
    }

    function getPhone(row) {
      return (
        row.phone ||
        row.parent_phone ||
        row.guardian_phone ||
        ""
      );
    }

    function getMedical(row) {
      return (
        row.medical_notes ||
        row.medical ||
        row.notes ||
        ""
      );
    }

    function getPhotoPermission(row) {
      const val =
        row.photo_permission ??
        row.photo_waiver ??
        row.media_permission ??
        "";
      if (val === true) return "Yes";
      if (val === false) return "No";
      return String(val || "");
    }

    function getWaiver(row) {
      const val =
        row.waiver_accepted ??
        row.risk_waiver ??
        row.waiver ??
        "";
      if (val === true) return "Yes";
      if (val === false) return "No";
      return String(val || "");
    }

    async function fetchRegistrations() {
      const { data, error } = await supabase
        .from(REGISTRATIONS_TABLE)
        .select("*")
        .order("created_at", { ascending: false });

      if (error) throw error;
      return data || [];
    }

    async function fetchOrders() {
      const { data, error } = await supabase
        .from(ORDERS_TABLE)
        .select("id, created_at, stripe_customer_email, payload")
        .order("created_at", { ascending: false });

      if (error) throw error;
      return data || [];
    }

    function buildOrderShirtSizeMaps(orders) {
      const byFullKey = new Map();
      const byNameDob = new Map();

      for (const order of orders) {
        const payload = order.payload || {};
        const reg = payload.registration || {};
        const player = reg.player || {};

        const firstName = player.firstName || player.first_name || "";
        const lastName = player.lastName || player.last_name || "";
        const dob = player.dob || player.dateOfBirth || player.date_of_birth || "";
        const shirtSize = player.shirtSize || player.shirt_size || "";
        const email = order.stripe_customer_email || reg.email || reg.parentEmail || "";

        if (!shirtSize || !firstName || !lastName || !dob) continue;

        const fullKey = makeKey(firstName, lastName, dob, email);
        const nameDobKey = makeKeyNoEmail(firstName, lastName, dob);

        if (!byFullKey.has(fullKey)) {
          byFullKey.set(fullKey, shirtSize);
        }

        if (!byNameDob.has(nameDobKey)) {
          byNameDob.set(nameDobKey, shirtSize);
        }
      }

      return { byFullKey, byNameDob };
    }

    function mergeRegistrationAndOrderData(registrations, orderMaps) {
      return registrations.map(row => {
        const firstName =
          row.first_name ||
          row.firstname ||
          row.player_first_name ||
          "";
        const lastName =
          row.last_name ||
          row.lastname ||
          row.player_last_name ||
          "";
        const dob = getRegistrationDob(row);
        const email = getRegistrationEmail(row);

        const savedJersey =
          row.jersey_size ||
          row.shirt_size ||
          "";

        const orderMatch =
          orderMaps.byFullKey.get(makeKey(firstName, lastName, dob, email)) ||
          orderMaps.byNameDob.get(makeKeyNoEmail(firstName, lastName, dob)) ||
          "";

        const displayJersey = savedJersey || orderMatch || "";
        const jerseySource = savedJersey ? "saved" : (orderMatch ? "order" : "blank");

        return {
          ...row,
          _display_name: getRegistrationName(row),
          _display_email: email,
          _display_dob: dob,
          _display_division: getRegistrationDivision(row),
          _display_team: getRegistrationTeam(row),
          _display_buddy: getBuddyRequest(row),
          _display_phone: getPhone(row),
          _display_medical: getMedical(row),
          _display_photo_permission: getPhotoPermission(row),
          _display_waiver: getWaiver(row),
          _jersey_size_display: displayJersey,
          _jersey_source: jerseySource
        };
      });
    }

    function sourceBadge(source) {
      if (source === "saved") {
        return `<span class="pill source-saved">Saved in registrations</span>`;
      }
      if (source === "order") {
        return `<span class="pill source-order">Pulled from order</span>`;
      }
      return `<span class="pill source-blank">No size found</span>`;
    }

    function renderTable(rows) {
      rowCount.textContent = rows.length;

      if (!rows.length) {
        registrationsBody.innerHTML = `
          <tr>
            <td colspan="13" class="muted">No registrations found.</td>
          </tr>
        `;
        return;
      }

      registrationsBody.innerHTML = rows.map(row => {
        return `
          <tr>
            <td class="nowrap">${escapeHtml(formatDate(row.created_at))}</td>
            <td>
              <div class="name-block">
                <strong>${escapeHtml(row._display_name)}</strong>
                <span class="small">ID: ${escapeHtml(row.id)}</span>
              </div>
            </td>
            <td>${escapeHtml(row._display_email)}</td>
            <td class="nowrap">${escapeHtml(formatDate(row._display_dob))}</td>
            <td>${escapeHtml(row._display_division)}</td>
            <td>${escapeHtml(row._display_team)}</td>
            <td>
              <input
                type="text"
                class="cell-input jersey-input"
                data-id="${escapeHtml(row.id)}"
                value="${escapeHtml(row._jersey_size_display)}"
                placeholder="Jersey size"
              />
            </td>
            <td>${sourceBadge(row._jersey_source)}</td>
            <td>${escapeHtml(row._display_buddy)}</td>
            <td>${escapeHtml(row._display_phone)}</td>
            <td>${escapeHtml(row._display_medical)}</td>
            <td>${escapeHtml(row._display_photo_permission)}</td>
            <td>${escapeHtml(row._display_waiver)}</td>
          </tr>
        `;
      }).join("");

      attachInputHandlers();
    }

    function filterRows() {
      const term = safeLower(searchInput.value);

      if (!term) {
        renderTable(allRows);
        return;
      }

      const filtered = allRows.filter(row => {
        return [
          row._display_name,
          row._display_email,
          row._display_division,
          row._display_team,
          row._display_buddy,
          row._display_phone,
          row._jersey_size_display
        ].some(value => safeLower(value).includes(term));
      });

      renderTable(filtered);
    }

    async function saveJerseySize(registrationId, newValue, inputEl) {
      inputEl.classList.remove("saved", "error");
      inputEl.classList.add("saving");

      const updatePayload = {
        jersey_size: newValue
      };

      const { error } = await supabase
        .from(REGISTRATIONS_TABLE)
        .update(updatePayload)
        .eq("id", registrationId);

      inputEl.classList.remove("saving");

      if (error) {
        inputEl.classList.add("error");
        showStatus(`Could not save Jersey Size for registration ${registrationId}: ${error.message}`, "err");
        return false;
      }

      inputEl.classList.add("saved");
      setTimeout(() => inputEl.classList.remove("saved"), 1200);
      return true;
    }

    function attachInputHandlers() {
      const inputs = document.querySelectorAll(".jersey-input");

      inputs.forEach(input => {
        let originalValue = input.value;

        input.addEventListener("focus", () => {
          originalValue = input.value;
        });

        input.addEventListener("keydown", async (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            input.blur();
          }
          if (e.key === "Escape") {
            input.value = originalValue;
            input.blur();
          }
        });

        input.addEventListener("blur", async () => {
          const registrationId = input.dataset.id;
          const newValue = input.value.trim();

          if (newValue === originalValue.trim()) return;

          const ok = await saveJerseySize(registrationId, newValue, input);

          if (ok) {
            const row = allRows.find(r => String(r.id) === String(registrationId));
            if (row) {
              row._jersey_size_display = newValue;
              row._jersey_source = newValue ? "saved" : "blank";
            }
            originalValue = newValue;
            showStatus("Jersey Size saved.", "ok");
            filterRows();
          }
        });
      });
    }

    async function loadPage() {
      clearStatus();
      registrationsBody.innerHTML = `
        <tr>
          <td colspan="13" class="muted">Loading registrations...</td>
        </tr>
      `;

      try {
        const [registrations, orders] = await Promise.all([
          fetchRegistrations(),
          fetchOrders()
        ]);

        const orderMaps = buildOrderShirtSizeMaps(orders);
        allRows = mergeRegistrationAndOrderData(registrations, orderMaps);

        filterRows();
        showStatus("Registrations loaded successfully.", "ok");
      } catch (err) {
        console.error(err);
        registrationsBody.innerHTML = `
          <tr>
            <td colspan="13" class="muted">Could not load registrations.</td>
          </tr>
        `;
        showStatus(`Could not load registrations: ${err.message}`, "err");
      }
    }

    searchInput.addEventListener("input", filterRows);
    refreshBtn.addEventListener("click", loadPage);

    loadPage();
  </script>
</body>
</html>
