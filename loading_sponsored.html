<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Loading...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root { --ink:#fff; --black:#000; }
    * { box-sizing: border-box; }
    body{
      margin:0;
      background:#000;
      color:#fff;
      font-family: Arial, Helvetica, sans-serif;
      min-height:100vh;
    }

    /* TOP BANNER (LOGO ONLY) */
    .top-banner{
      width:100%;
      background:#000;
      aspect-ratio: 8 / 1;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:56px;
      position:relative;
    }
    .top-banner img{
      height:82%;
      width:auto;
      max-width:90vw;
      object-fit:contain;
      display:block;
    }

    /* LOADING */
    .stage{
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 3rem 1rem;
    }
    .wrap{
      text-align:center;
      padding:2rem;
      max-width:760px;
      width:100%;
    }
    .spinner{
      width:56px; height:56px;
      border:6px solid #333;
      border-top-color:#fff;
      border-radius:50%;
      margin:0 auto 1rem;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .txt{ opacity:0.92; font-size:1rem; }
    .sub{ opacity:0.65; margin-top:0.35rem; font-size:0.9rem; line-height:1.35; }
    .badge{
      display:inline-block;
      margin-top:0.9rem;
      padding:0.25rem 0.6rem;
      border:1px solid #333;
      border-radius:999px;
      font-size:0.8rem;
      opacity:0.7;
    }
    .err{
      display:none;
      margin-top:1.1rem;
      background:#111;
      border:1px solid #333;
      padding:1rem;
      border-radius:12px;
      color:#fff;
      text-align:left;
      font-size:0.92rem;
      opacity:0.95;
      white-space:pre-wrap;
    }
  </style>
</head>

<body>
  <div class="top-banner">
    <a href="index.html" style="display:flex; align-items:center; justify-content:center; height:100%; width:100%;">
      <img src="White Logo.jpg" alt="League Logo">
    </a>
  </div>

  <div class="stage">
    <div class="wrap">
      <div class="spinner" id="spinner"></div>
      <div class="txt" id="mainTxt">Processing sponsored registration…</div>
      <div class="sub" id="subTxt">One moment. You’ll be redirected automatically.</div>
      <div class="badge" id="badge">SPONSORED-LOADING-ONE-TIME-001</div>
      <div class="err" id="errBox"></div>
    </div>
  </div>

  <script>
    (function () {
      const errBox = document.getElementById('errBox');
      const mainTxt = document.getElementById('mainTxt');
      const subTxt = document.getElementById('subTxt');
      const spinner = document.getElementById('spinner');

      function showError(msg) {
        if (spinner) spinner.style.display = 'none';
        errBox.style.display = 'block';
        errBox.textContent = msg;
      }

      function getRawPayload() {
        return (
          sessionStorage.getItem('HFF_CHECKOUT_PAYLOAD') ||
          localStorage.getItem('HFF_CHECKOUT_PAYLOAD')
        );
      }

      function safeJson(raw) {
        try { return JSON.parse(raw); } catch { return null; }
      }

      // Optional URL token for separate sponsored links
      const params = new URLSearchParams(window.location.search);
      const token = (params.get('token') || 'default-sponsored-link').trim();

      // Browser/device one-time lock only
      const usedKey = 'HFF_SPONSORED_LINK_USED_' + token;

      if (localStorage.getItem(usedKey) === 'true') {
        mainTxt.textContent = 'This sponsored registration link has already been used on this device.';
        subTxt.textContent = 'If this was a mistake, please contact Hanover Flag Football.';
        showError(
          'This sponsored loading link is set to one-time use per browser/device.\n\n' +
          'It has already been used here, so registration was not processed again.'
        );
        return;
      }

      const raw = getRawPayload();
      const parsed = raw ? safeJson(raw) : null;

      if (!raw || !parsed) {
        showError(
          'No registration data was found.\n\n' +
          'Please go back to the sponsored registration form and submit it again.'
        );
        return;
      }

      const isRegistration =
        parsed.type === 'registration' ||
        (parsed.data && parsed.data.parent && parsed.data.player) ||
        (parsed.parent && parsed.player);

      if (!isRegistration) {
        showError(
          'This page is only for sponsored player registrations.\n\n' +
          'Shop checkout is not supported on this page.'
        );
        return;
      }

      const reg = parsed.data || parsed;

      // Mark as sponsored in case the form page did not
      reg.sponsoredRegistration = true;
      reg.sponsoredAmount = 0;

      const playerName =
        (reg.player && (reg.player.firstName || reg.player.lastName))
          ? ((reg.player.firstName || '') + ' ' + (reg.player.lastName || '')).trim()
          : 'Sponsored Player';

      // Save the updated payload back
      const checkoutPayload = JSON.stringify({ type: 'registration', data: reg });
      sessionStorage.setItem('HFF_CHECKOUT_PAYLOAD', checkoutPayload);
      localStorage.setItem('HFF_CHECKOUT_PAYLOAD', checkoutPayload);

      // Mark this token/browser as used
      localStorage.setItem(usedKey, 'true');

      mainTxt.textContent = 'Sponsored registration confirmed';
      subTxt.textContent = 'Redirecting to confirmation page…';

      // Redirect without Stripe
      const successUrl =
        window.location.origin +
        '/success.html' +
        '?sponsored=1' +
        '&player=' + encodeURIComponent(playerName) +
        '&v=' + Date.now();

      setTimeout(() => {
        window.location.replace(successUrl);
      }, 1200);
    })();
  </script>
</body>
</html>
