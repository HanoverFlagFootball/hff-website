<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Scores & Schedules</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --ink: #fff;
      --line: #333;
      --black: #000;
      --accent: #0b5ed7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: var(--ink);
    }

    /* =========================
       SCORES STRIP
       ========================= */
    .scores-strip {
      width: 100%;
      background: #000;
      padding: 0.35rem 1rem;
      overflow: hidden;
    }
    .score-row {
      display: flex;
      gap: 0.5rem;
      align-items: stretch;
      min-height: 70px;
    }
    .score-box {
      background: #fff;
      color: #000;
      border: 1px solid #ccc;
      border-radius: 0.5rem;
      padding: 0.35rem 0.45rem;
      flex: 0 0 calc((100% - 4.5rem) / 10);
      min-height: 74px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .score-title {
      font-size: 0.65rem;
      text-align: center;
      border-bottom: 1px solid #ddd;
      margin-bottom: 0.15rem;
      padding-bottom: 0.15rem;
    }
    .team-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.15rem;
      line-height: 1.05;
    }
    .team-left {
      display: flex;
      align-items: center;
      gap: 0.2rem;
      min-width: 0;
      flex: 1;
    }
    .team-logo {
      width: 20px;
      height: 20px;
      object-fit: contain;
      background: #fff;
      border-radius: 4px;
      padding: 1px;
    }
    .team-name {
      flex: 1;
      font-size: 0.68rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .team-score {
      width: 1.9rem;
      text-align: right;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .score-status {
      font-size: 0.58rem;
      text-align: center;
      margin-top: 0.2rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    @media (max-width: 700px) {
      .scores-strip { overflow: hidden; }
      .score-row { justify-content: center; }
      .score-box {
        flex: 0 0 calc((100% - 0.6rem) / 2);
      }
      .score-box:nth-child(n + 3) { display: none; }
    }

    /* =========================
       TOP BANNER
       ========================= */
    .top-banner {
      width: 100%;
      background: #000;
      aspect-ratio: 8 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 56px;
      position: relative;
    }
    .top-banner img {
      height: 82%;
      width: auto;
      max-width: 90vw;
      object-fit: contain;
      display: block;
    }

    /* =========================
       PAGE CONTENT
       ========================= */
    .content-wrapper {
      padding: 1.5rem 2rem 3rem;
      background: #000;
      display: flex;
      justify-content: center;
    }
    .by-team-box {
      background: #fff;
      color: #000;
      border: 1px solid #333;
      border-radius: 0.7rem;
      padding: 1.3rem 1.4rem 1.6rem;
      max-width: 1100px;
      width: 100%;
      box-shadow: 0 0 15px rgba(255,255,255,0.05);
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .tab-btn {
      background: #eee;
      border: 1px solid #ccc;
      border-radius: 0.5rem;
      padding: 0.55rem 0.8rem;
      text-align: center;
      font-weight: 600;
      cursor: pointer;
    }
    .tab-btn.active {
      background: #000;
      color: #fff;
      border-color: #000;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .team-section { margin-bottom: 1.3rem; }
    .team-section-title {
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      text-align: center;
    }
    .team-card-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.6rem;
    }
    .team-card {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid #ddd;
      border-radius: 0.5rem;
      background: #fff;
      min-height: 130px;
      text-align: center;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.15s ease, transform 0.15s ease;
      cursor: default;
    }
    .team-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    }
    .team-card-title { font-weight: 700; font-size: 0.9rem; }
    .team-card img {
      width: 65px;
      height: 65px;
      object-fit: contain;
      background: #fff;
      border-radius: 6px;
    }

    .season-week {
      margin-top: 1.8rem;
    }
    .weekly-title {
      text-align: center;
      font-weight: 700;
      text-transform: uppercase;
      border-top: 2px solid #333;
      padding-top: 0.7rem;
      margin-top: 1.5rem;
      margin-bottom: 0.35rem;
      letter-spacing: 0.04em;
    }
    .weekly-date {
      text-align: center;
      font-weight: 600;
      margin-bottom: 1rem;
    }
    .week-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .week-game {
      display: flex;
      gap: 0.75rem;
      border: 1px solid #ddd;
      border-radius: 0.5rem;
      background: #fff;
      padding: 0.65rem 0.75rem;
      align-items: stretch;
    }
    .week-left {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      min-width: 0;
    }
    .week-team-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .week-team-info {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      min-width: 0;
      flex: 1;
    }
    .week-team-logo {
      width: 30px;
      height: 30px;
      object-fit: contain;
      background: #fff;
      border-radius: 4px;
      flex: 0 0 30px;
    }
    .week-team-name-wrap {
      display: flex;
      align-items: baseline;
      gap: 0.3rem;
      min-width: 0;
      flex-wrap: wrap;
    }
    .week-team-name {
      font-weight: 700;
      font-size: 0.86rem;
      white-space: nowrap;
    }
    .week-team-record {
      font-size: 0.7rem;
      color: #888;
      white-space: nowrap;
    }
    .week-score {
      font-weight: 600;
      font-size: 0.8rem;
      white-space: nowrap;
      margin-left: 0.6rem;
    }
    .week-divider {
      width: 1px;
      background: #ddd;
      margin: 0 0.5rem;
    }
    .week-right {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.2rem;
      min-width: 145px;
    }
    .week-datetime {
      font-size: 0.78rem;
      font-weight: 600;
    }
    .week-field {
      font-size: 0.7rem;
      color: #333;
    }

    .temp-schedule-overlay {
      border: 2px dashed #333;
      border-radius: 0.7rem;
      padding: 2rem 1rem;
      text-align: center;
      margin-top: 0.5rem;
      background: #fff;
    }
    .temp-schedule-overlay h2 {
      margin: 0 0 0.35rem;
      font-size: 1.3rem;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .temp-schedule-overlay p {
      margin: 0;
      font-size: 0.95rem;
      color: #333;
    }

    .import-box {
      border: 1px solid #ddd;
      border-radius: 0.7rem;
      padding: 1rem;
      background: #fafafa;
      margin-bottom: 1rem;
    }
    .import-box h3 {
      margin: 0 0 0.5rem;
      font-size: 1rem;
    }
    .import-help {
      font-size: 0.9rem;
      color: #444;
      margin-bottom: 0.6rem;
      line-height: 1.35;
    }
    .schedule-input {
      width: 100%;
      min-height: 180px;
      resize: vertical;
      border: 1px solid #ccc;
      border-radius: 0.5rem;
      padding: 0.75rem;
      font: inherit;
      margin-bottom: 0.75rem;
    }
    .import-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      align-items: center;
    }
    .import-btn,
    .file-btn {
      background: #000;
      color: #fff;
      border: 1px solid #000;
      border-radius: 0.5rem;
      padding: 0.55rem 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .secondary-btn {
      background: #fff;
      color: #000;
      border: 1px solid #ccc;
    }
    .hidden-file-input {
      display: none;
    }
    .import-status {
      margin-top: 0.75rem;
      font-size: 0.9rem;
      font-weight: 600;
    }
    .import-status.error {
      color: #b00020;
    }
    .import-status.success {
      color: #146c2e;
    }

    @media (max-width: 720px) {
      .week-game { flex-direction: column; }
      .week-divider { height: 1px; width: 100%; margin: 0.5rem 0; }
      .week-right { min-width: 0; }
    }

    @media (max-width: 620px) {
      .content-wrapper { padding: 1.2rem 1rem 3rem; }
      .team-card-row { grid-template-columns: repeat(2, minmax(140px, 1fr)); }
    }
  </style>
</head>

<body>

  <div class="scores-strip">
    <div class="score-row" id="scoreRow"></div>
  </div>

  <div class="top-banner">
    <a href="index.html" style="display:flex; align-items:center; justify-content:center; height:100%; width:100%;">
      <img src="White Logo.jpg" alt="League Logo" style="height:82%; width:auto; max-width:90vw; object-fit:contain; display:block; cursor:pointer;">
    </a>
    <div id="site-nav"></div>
  </div>

  <div class="content-wrapper">
    <div class="by-team-box">

      <div class="tabs">
        <button class="tab-btn active" data-tab="tab-team">By Team</button>
        <button class="tab-btn" data-tab="tab-week">By Week</button>
      </div>

      <div id="tab-team" class="tab-panel active"></div>

      <div id="tab-week" class="tab-panel"></div>

    </div>
  </div>

  <script src="scores-strip.js"></script>
  <script src="nav.js"></script>
  <script src="team-directory.js"></script>

  <script>
    const SHOW_SCHEDULE_COMING_SOON = false;
    const LOCAL_STORAGE_KEY = 'hff_uploaded_schedule_csv';

    const tabButtons = document.querySelectorAll('.tab-btn');
    const tabPanels = document.querySelectorAll('.tab-panel');

    let uploadedGames = [];

    tabButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        const target = btn.getAttribute('data-tab');
        tabButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        tabPanels.forEach(p => {
          if (p.id === target) p.classList.add('active');
          else p.classList.remove('active');
        });
      });
    });

    function applyScheduleComingSoon(panelId) {
      const panel = document.getElementById(panelId);
      if (!panel) return;

      panel.innerHTML = `
        <div class="temp-schedule-overlay">
          <h2>Schedule Coming Soon</h2>
          <p>We’re finalizing matchups and times. Check back soon!</p>
        </div>
      `;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function normalizeHeader(value) {
      return String(value || '')
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '');
    }

    function splitDelimitedLine(line, delimiter) {
      const result = [];
      let current = '';
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        const next = line[i + 1];

        if (ch === '"') {
          if (inQuotes && next === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (ch === delimiter && !inQuotes) {
          result.push(current);
          current = '';
        } else {
          current += ch;
        }
      }

      result.push(current);
      return result.map(v => v.trim());
    }

    function parseDelimitedText(text) {
      const cleaned = String(text || '').replace(/\r/g, '').trim();
      if (!cleaned) return [];

      const lines = cleaned.split('\n').filter(line => line.trim() !== '');
      if (lines.length < 2) return [];

      const firstLine = lines[0];
      const delimiter = firstLine.includes('\t') ? '\t' : ',';

      const headers = splitDelimitedLine(firstLine, delimiter).map(normalizeHeader);

      const rows = [];
      for (let i = 1; i < lines.length; i++) {
        const values = splitDelimitedLine(lines[i], delimiter);
        const row = {};
        headers.forEach((header, idx) => {
          row[header] = (values[idx] || '').trim();
        });
        rows.push(row);
      }

      return rows;
    }

    function getRowValue(row, possibleHeaders) {
      for (const key of possibleHeaders) {
        if (row[key] !== undefined && row[key] !== null && String(row[key]).trim() !== '') {
          return String(row[key]).trim();
        }
      }
      return '';
    }

    function formatDateLabel(dateStr) {
      if (!dateStr) return '';
      const parts = dateStr.split('-');
      if (parts.length !== 3) return dateStr;

      const year = Number(parts[0]);
      const month = Number(parts[1]) - 1;
      const day = Number(parts[2]);
      const d = new Date(year, month, day);

      if (Number.isNaN(d.getTime())) return dateStr;

      return d.toLocaleDateString('en-CA', {
        weekday: 'long',
        month: 'long',
        day: 'numeric',
        year: 'numeric'
      });
    }

    function formatTimeLabel(timeStr) {
      if (!timeStr) return '';
      const raw = String(timeStr).trim();

      if (/^\d{1,2}:\d{2}(:\d{2})?$/.test(raw)) {
        const parts = raw.split(':');
        const hours = Number(parts[0]);
        const minutes = Number(parts[1]);

        if (!Number.isNaN(hours) && !Number.isNaN(minutes)) {
          const d = new Date();
          d.setHours(hours, minutes, 0, 0);
          return d.toLocaleTimeString('en-CA', {
            hour: 'numeric',
            minute: '2-digit'
          });
        }
      }

      return raw;
    }

    function inferDivision(teamName) {
      const match = String(teamName || '').match(/\((U\d+|Adult)\)/i);
      return match ? match[1].replace('adult', 'Adult').toUpperCase().replace(/^ADULT$/, 'Adult') : '';
    }

    function teamLabelWithoutDivision(teamName) {
      return String(teamName || '').replace(/\s*\((U\d+|Adult)\)\s*/i, '').trim();
    }

    function getTeamLogo(teamName) {
      if (
        window.HFF_TEAM_DIRECTORY &&
        typeof window.HFF_TEAM_DIRECTORY.getAllTeams === 'function'
      ) {
        const teams = window.HFF_TEAM_DIRECTORY.getAllTeams() || [];
        const exact = teams.find(t =>
          String(t.teamLabel || '').trim().toLowerCase() === String(teamName || '').trim().toLowerCase()
        );
        if (exact && exact.teamLogo) return exact.teamLogo;

        const stripped = teamLabelWithoutDivision(teamName).toLowerCase();
        const loose = teams.find(t =>
          String(t.cardTitle || t.teamLabel || '').trim().toLowerCase() === stripped
        );
        if (loose && loose.teamLogo) return loose.teamLogo;
      }
      return 'White Logo.jpg';
    }

    function buildGamesFromRows(rows) {
      return rows
        .map((row, index) => {
          const date = getRowValue(row, ['date', 'gamedate']);
          const time = getRowValue(row, ['time', 'gametime']);
          const home = getRowValue(row, ['hometeam', 'home']);
          const away = getRowValue(row, ['awayteam', 'away']);
          const homeScore = getRowValue(row, ['hometeamscore', 'homescore']);
          const awayScore = getRowValue(row, ['awayteamscore', 'awayscore']);
          const field = getRowValue(row, ['field', 'location', 'venue']) || 'Field TBD';

          if (!date || !time || !home || !away) return null;

          return {
            id: `${date}-${time}-${home}-${away}-${index}`,
            rawDate: date,
            rawTime: time,
            home,
            away,
            homeScore,
            awayScore,
            field,
            division: inferDivision(home) || inferDivision(away),
            homeLogo: getTeamLogo(home),
            awayLogo: getTeamLogo(away),
            datetime: `${formatTimeLabel(time)}`,
            sortKey: `${date}T${time}`
          };
        })
        .filter(Boolean)
        .sort((a, b) => a.sortKey.localeCompare(b.sortKey));
    }

    function groupGamesIntoWeeks(games) {
      const byDate = new Map();

      games.forEach(game => {
        if (!byDate.has(game.rawDate)) byDate.set(game.rawDate, []);
        byDate.get(game.rawDate).push(game);
      });

      const dates = Array.from(byDate.keys()).sort();
      return dates.map((date, idx) => ({
        weekTitle: `Week ${idx + 1}`,
        weekDate: formatDateLabel(date),
        games: byDate.get(date)
      }));
    }

    function createWeekGameBox(g) {
      const box = document.createElement('div');
      box.className = 'week-game';
      box.innerHTML = `
        <div class="week-left">
          <div class="week-team-row">
            <div class="week-team-info">
              <img src="${escapeHtml(g.awayLogo)}" alt="${escapeHtml(g.away)}" class="week-team-logo">
              <div class="week-team-name-wrap">
                <span class="week-team-name">${escapeHtml(g.away)}</span>
                <span class="week-team-record"></span>
              </div>
            </div>
            <div class="week-score">${escapeHtml(g.awayScore || '0')}</div>
          </div>
          <div class="week-team-row">
            <div class="week-team-info">
              <img src="${escapeHtml(g.homeLogo)}" alt="${escapeHtml(g.home)}" class="week-team-logo">
              <div class="week-team-name-wrap">
                <span class="week-team-name">${escapeHtml(g.home)}</span>
                <span class="week-team-record"></span>
              </div>
            </div>
            <div class="week-score">${escapeHtml(g.homeScore || '0')}</div>
          </div>
        </div>
        <div class="week-divider"></div>
        <div class="week-right">
          <div class="week-datetime">${escapeHtml(g.datetime)}</div>
          <div class="week-field">${escapeHtml(g.field)}</div>
        </div>
      `;
      return box;
    }

    function renderImportBox(statusText = '', statusClass = '') {
      const savedText = localStorage.getItem(LOCAL_STORAGE_KEY) || '';
      return `
        <div class="import-box">
          <h3>Upload or Paste Schedule Table</h3>
          <div class="import-help">
            Paste your table directly from Excel/Sheets, or upload a CSV file.<br>
            Required columns: <strong>Date, Time, Home Team, Away Team</strong><br>
            Optional columns: <strong>Home Team Score, Away Team Score, Field</strong>
          </div>

          <textarea
            id="schedulePasteInput"
            class="schedule-input"
            placeholder="Paste rows here..."
          >${escapeHtml(savedText)}</textarea>

          <div class="import-actions">
            <button class="import-btn" id="loadScheduleBtn" type="button">Load Schedule</button>

            <label class="file-btn secondary-btn" for="scheduleFileInput">Upload CSV</label>
            <input class="hidden-file-input" id="scheduleFileInput" type="file" accept=".csv,text/csv" />

            <button class="import-btn secondary-btn" id="clearScheduleBtn" type="button">Clear Saved Schedule</button>
          </div>

          ${statusText ? `<div class="import-status ${statusClass}">${escapeHtml(statusText)}</div>` : ''}
        </div>
      `;
    }

    function attachImportHandlers() {
      const loadBtn = document.getElementById('loadScheduleBtn');
      const clearBtn = document.getElementById('clearScheduleBtn');
      const fileInput = document.getElementById('scheduleFileInput');
      const pasteInput = document.getElementById('schedulePasteInput');

      if (loadBtn) {
        loadBtn.addEventListener('click', () => {
          const text = pasteInput ? pasteInput.value : '';
          loadScheduleFromText(text);
        });
      }

      if (clearBtn) {
        clearBtn.addEventListener('click', () => {
          localStorage.removeItem(LOCAL_STORAGE_KEY);
          uploadedGames = [];
          renderSeasonByWeekUI('Saved schedule cleared.', 'success');
        });
      }

      if (fileInput) {
        fileInput.addEventListener('change', async (event) => {
          const file = event.target.files && event.target.files[0];
          if (!file) return;

          try {
            const text = await file.text();
            if (pasteInput) pasteInput.value = text;
            loadScheduleFromText(text);
          } catch (err) {
            renderSeasonByWeekUI('Could not read that CSV file.', 'error');
          }

          fileInput.value = '';
        });
      }
    }

    function loadScheduleFromText(text) {
      const rows = parseDelimitedText(text);

      if (!rows.length) {
        renderSeasonByWeekUI('No rows found. Paste the table including the header row.', 'error');
        return;
      }

      const games = buildGamesFromRows(rows);

      if (!games.length) {
        renderSeasonByWeekUI('Could not build games. Check that your headers include Date, Time, Home Team, and Away Team.', 'error');
        return;
      }

      localStorage.setItem(LOCAL_STORAGE_KEY, text);
      uploadedGames = games;
      renderSeasonByWeekUI(`Loaded ${games.length} games successfully.`, 'success');
    }

    function renderByTeamFromDirectory() {
      const tabTeam = document.getElementById('tab-team');
      if (!tabTeam) return;

      if (SHOW_SCHEDULE_COMING_SOON) {
        applyScheduleComingSoon('tab-team');
        return;
      }

      if (!window.HFF_TEAM_DIRECTORY || typeof window.HFF_TEAM_DIRECTORY.getAllTeams !== 'function') {
        tabTeam.innerHTML = '<p>Could not load teams.</p>';
        return;
      }

      const teams = window.HFF_TEAM_DIRECTORY.getAllTeams();
      if (!teams || !teams.length) {
        tabTeam.innerHTML = '<p>No teams found.</p>';
        return;
      }

      const grouped = {};
      teams.forEach(t => {
        const div = String(t.division || '').trim();
        if (!div) return;
        if (!grouped[div]) grouped[div] = [];
        grouped[div].push(t);
      });

      const order = ['U6', 'U9', 'U12', 'U16', 'Adult'];
      const divisions = Object.keys(grouped).sort((a, b) => {
        const ia = order.indexOf(a);
        const ib = order.indexOf(b);
        if (ia === -1 && ib === -1) return a.localeCompare(b);
        if (ia === -1) return 1;
        if (ib === -1) return -1;
        return ia - ib;
      });

      tabTeam.innerHTML = '';

      divisions.forEach(div => {
        const section = document.createElement('div');
        section.className = 'team-section';

        const title = document.createElement('div');
        title.className = 'team-section-title';
        title.textContent = div + ' Scores & Schedule';
        section.appendChild(title);

        const row = document.createElement('div');
        row.className = 'team-card-row';

        grouped[div]
          .slice()
          .sort((a, b) => {
            const aa = String(a.cardTitle || a.teamLabel || '').toLowerCase();
            const bb = String(b.cardTitle || b.teamLabel || '').toLowerCase();
            return aa.localeCompare(bb);
          })
          .forEach(t => {
            const card = document.createElement('div');
            card.className = 'team-card';

            const cardTitle = document.createElement('div');
            cardTitle.className = 'team-card-title';
            cardTitle.textContent = t.cardTitle || t.teamLabel || 'Team';
            card.appendChild(cardTitle);

            const img = document.createElement('img');
            img.src = t.teamLogo || 'White Logo.jpg';
            img.alt = (t.cardTitle || t.teamLabel || 'Team') + ' logo';
            card.appendChild(img);

            row.appendChild(card);
          });

        section.appendChild(row);
        tabTeam.appendChild(section);
      });
    }

    function renderSeasonByWeekUI(statusText = '', statusClass = '') {
      const tabWeek = document.getElementById('tab-week');
      if (!tabWeek) return;

      if (SHOW_SCHEDULE_COMING_SOON) {
        applyScheduleComingSoon('tab-week');
        return;
      }

      tabWeek.innerHTML = renderImportBox(statusText, statusClass);

      const text = localStorage.getItem(LOCAL_STORAGE_KEY) || '';
      if (!uploadedGames.length && text.trim()) {
        const rows = parseDelimitedText(text);
        uploadedGames = buildGamesFromRows(rows);
      }

      if (!uploadedGames.length) {
        const emptyState = document.createElement('div');
        emptyState.className = 'temp-schedule-overlay';
        emptyState.innerHTML = `
          <h2>No Schedule Loaded Yet</h2>
          <p>Paste your schedule table above or upload a CSV file.</p>
        `;
        tabWeek.appendChild(emptyState);
        attachImportHandlers();
        return;
      }

      const weeks = groupGamesIntoWeeks(uploadedGames);

      weeks.forEach(week => {
        const section = document.createElement('div');
        section.className = 'season-week';

        const title = document.createElement('div');
        title.className = 'weekly-title';
        title.textContent = week.weekTitle || 'Weekly Scores & Schedule';
        section.appendChild(title);

        const date = document.createElement('div');
        date.className = 'weekly-date';
        date.textContent = week.weekDate || '';
        section.appendChild(date);

        const list = document.createElement('div');
        list.className = 'week-list';

        (week.games || []).forEach(g => {
          list.appendChild(createWeekGameBox(g));
        });

        section.appendChild(list);
        tabWeek.appendChild(section);
      });

      attachImportHandlers();
    }

    renderByTeamFromDirectory();
    renderSeasonByWeekUI();
  </script>
</body>
</html>
