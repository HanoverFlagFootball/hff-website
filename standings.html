<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Standings | Hanover Flag Football</title>

  <link rel="stylesheet" href="style.css" />

  <style>
    .standings-wrap {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .standings-title {
      text-align: center;
      margin-bottom: 30px;
    }

    .division-standings {
      margin-bottom: 40px;
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    .division-standings h2 {
      margin: 0;
      padding: 16px 20px;
      background: #111827;
      color: white;
      font-size: 1.4rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid #e5e7eb;
    }

    th {
      background: #f3f4f6;
      font-weight: 700;
    }

    td.team-name {
      text-align: left;
      font-weight: 700;
    }

    .team-logo-small {
      width: 32px;
      height: 32px;
      object-fit: contain;
      vertical-align: middle;
      margin-right: 8px;
    }

    .empty-message {
      padding: 20px;
      text-align: center;
      color: #666;
    }
  </style>
</head>

<body>

  <!-- HEADER / NAV -->
  <header>
    <div class="logo">
      <a href="index.html">
        <img src="Logo.jpg" alt="Hanover Flag Football Logo">
      </a>
    </div>

    <nav>
      <a href="index.html">Home</a>
      <a href="scores&schedules.html">Scores &amp; Schedules</a>
      <a href="standings.html">Standings</a>
      <a href="rules.html">Rules &amp; Info</a>
    </nav>
  </header>

  <main class="standings-wrap">
    <div class="standings-title">
      <h1>Standings</h1>
      <p>Updated automatically from the season schedule.</p>
    </div>

    <div id="standings-container"></div>
  </main>

  <script src="season-schedule.js?v=1"></script>

  <script>
    const DIVISIONS_TO_SHOW = ["U9", "U12", "U16"];

    function getDivision(teamName) {
      const match = String(teamName || "").match(/\((U\d+)\)/);
      return match ? match[1] : "";
    }

    function cleanTeamName(teamName) {
      return String(teamName || "").replace(/\s*\(U\d+\)\s*/g, "").trim();
    }

    function getLogo(teamName) {
      const clean = cleanTeamName(teamName);
      return clean ? `${clean}.png` : "Logo.jpg";
    }

    function isRealGame(game) {
      const home = game.homeTeam || game.home || game.home_team || "";
      const away = game.awayTeam || game.away || game.away_team || "";

      if (!home || !away) return false;
      if (home.toLowerCase().includes("practice")) return false;
      if (away.toLowerCase().includes("practice")) return false;

      return true;
    }

    function getScoreValue(value) {
      if (value === null || value === undefined || value === "") return null;
      if (String(value).toUpperCase() === "TBD") return null;

      const number = Number(value);
      return Number.isFinite(number) ? number : null;
    }

    function buildStandings() {
      const standings = {
        U9: {},
        U12: {},
        U16: {}
      };

      if (!window.HFF_SCHEDULE || typeof window.HFF_SCHEDULE.getAllWeeks !== "function") {
        document.getElementById("standings-container").innerHTML =
          `<div class="empty-message">Could not load standings. Make sure season-schedule.js is linked correctly.</div>`;
        return standings;
      }

      const weeks = window.HFF_SCHEDULE.getAllWeeks();

      weeks.forEach(week => {
        const games = week.games || [];

        games.forEach(game => {
          if (!isRealGame(game)) return;

          const homeTeam = game.homeTeam || game.home || game.home_team || "";
          const awayTeam = game.awayTeam || game.away || game.away_team || "";

          const division = getDivision(homeTeam) || getDivision(awayTeam);
          if (!DIVISIONS_TO_SHOW.includes(division)) return;

          if (!standings[division][homeTeam]) {
            standings[division][homeTeam] = createTeamRecord(homeTeam);
          }

          if (!standings[division][awayTeam]) {
            standings[division][awayTeam] = createTeamRecord(awayTeam);
          }

          const homeScore = getScoreValue(
            game.homeScore ?? game.homeTeamScore ?? game.home_team_score
          );

          const awayScore = getScoreValue(
            game.awayScore ?? game.awayTeamScore ?? game.away_team_score
          );

          // Count only completed games with actual scores
          if (homeScore === null || awayScore === null) return;

          standings[division][homeTeam].pointsFor += homeScore;
          standings[division][homeTeam].pointsAgainst += awayScore;

          standings[division][awayTeam].pointsFor += awayScore;
          standings[division][awayTeam].pointsAgainst += homeScore;

          if (homeScore > awayScore) {
            standings[division][homeTeam].wins++;
            standings[division][awayTeam].losses++;
          } else if (awayScore > homeScore) {
            standings[division][awayTeam].wins++;
            standings[division][homeTeam].losses++;
          } else {
            standings[division][homeTeam].ties++;
            standings[division][awayTeam].ties++;
          }
        });
      });

      return standings;
    }

    function createTeamRecord(teamName) {
      return {
        teamName,
        wins: 0,
        losses: 0,
        ties: 0,
        pointsFor: 0,
        pointsAgainst: 0
      };
    }

    function sortTeams(teams) {
      return teams.sort((a, b) => {
        const aPoints = a.wins * 2 + a.ties;
        const bPoints = b.wins * 2 + b.ties;

        const aDiff = a.pointsFor - a.pointsAgainst;
        const bDiff = b.pointsFor - b.pointsAgainst;

        return (
          bPoints - aPoints ||
          b.wins - a.wins ||
          bDiff - aDiff ||
          b.pointsFor - a.pointsFor ||
          cleanTeamName(a.teamName).localeCompare(cleanTeamName(b.teamName))
        );
      });
    }

    function renderStandings() {
      const container = document.getElementById("standings-container");
      const standings = buildStandings();

      container.innerHTML = "";

      DIVISIONS_TO_SHOW.forEach(division => {
        const teams = sortTeams(Object.values(standings[division]));

        const section = document.createElement("section");
        section.className = "division-standings";

        section.innerHTML = `
          <h2>${division} Standings</h2>
          ${
            teams.length === 0
              ? `<div class="empty-message">No completed games yet.</div>`
              : `
                <table>
                  <thead>
                    <tr>
                      <th>Team</th>
                      <th>W</th>
                      <th>L</th>
                      <th>T</th>
                      <th>PF</th>
                      <th>PA</th>
                      <th>+/-</th>
                      <th>Pts</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${teams.map(team => {
                      const diff = team.pointsFor - team.pointsAgainst;
                      const points = team.wins * 2 + team.ties;

                      return `
                        <tr>
                          <td class="team-name">
                            <img 
                              class="team-logo-small" 
                              src="${getLogo(team.teamName)}" 
                              alt="${cleanTeamName(team.teamName)} Logo"
                              onerror="this.src='Logo.jpg'"
                            >
                            ${cleanTeamName(team.teamName)}
                          </td>
                          <td>${team.wins}</td>
                          <td>${team.losses}</td>
                          <td>${team.ties}</td>
                          <td>${team.pointsFor}</td>
                          <td>${team.pointsAgainst}</td>
                          <td>${diff > 0 ? "+" + diff : diff}</td>
                          <td>${points}</td>
                        </tr>
                      `;
                    }).join("")}
                  </tbody>
                </table>
              `
          }
        `;

        container.appendChild(section);
      });
    }

    renderStandings();
  </script>

</body>
</html>
