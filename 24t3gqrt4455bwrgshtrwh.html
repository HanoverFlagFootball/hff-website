<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sponsored Registration - Flag Football League</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root { --ink:#fff; --line:#333; --black:#000; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: var(--ink);
    }

    .closed-message {
      display: none;
      margin: 1rem 0 1.5rem;
      padding: 1rem;
      border: 2px solid #0b5ed7;
      background: #f0f6ff;
      color: #000;
      text-align: center;
      font-weight: 700;
    }
    .registration-closed .closed-message { display:block; }
    .registration-closed #registrationForm { display:none; }

    .register-page { padding:2rem 1rem; display:flex; justify-content:center; }
    .register-wrapper {
      width:100%; max-width:900px;
      background:#fff; color:#000;
      padding:1.5rem;
    }

    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    @media(max-width:800px){ .form-grid{ grid-template-columns:1fr; } }

    input, select, textarea {
      width:100%; padding:0.4rem;
      border:1px solid #ccc;
    }

    .submit-btn {
      padding:0.6rem 1.6rem;
      border:none;
      background:#0b5ed7;
      color:#fff;
      cursor:pointer;
      border-radius:999px;
    }
  </style>
</head>

<body>

<script>
  const REGISTRATION_OPEN = true;
</script>

<section class="register-page">
  <div class="register-wrapper">

    <h1>Sponsored Player Registration</h1>

    <p><strong>Registration Fee: $0 (Sponsored)</strong></p>

    <div class="closed-message">
      This registration link is currently unavailable.
    </div>

    <form id="registrationForm">

      <!-- Parent -->
      <h3>Parent Info</h3>
      <div class="form-grid">
        <input id="parentName" placeholder="Full Name" required />
        <input id="parentEmail" placeholder="Email" required />
        <input id="parentPhone" placeholder="Phone" required />
        <input id="homeTown" placeholder="Town" />
      </div>

      <!-- Player -->
      <h3>Player Info</h3>
      <div class="form-grid">
        <input id="playerFirstName" placeholder="First Name" required />
        <input id="playerLastName" placeholder="Last Name" required />
        <input type="date" id="playerDob" required />

        <div>
          <label>
            <input type="radio" name="ageGroup" value="U6"> U6
          </label>
          <label>
            <input type="radio" name="ageGroup" value="7plus"> 7plus
          </label>
        </div>

        <select id="shirtSize" required>
          <option value="">Shirt Size</option>
          <option value="YS">YS</option>
          <option value="YM">YM</option>
          <option value="YL">YL</option>
          <option value="AS">AS</option>
          <option value="AM">AM</option>
          <option value="AL">AL</option>
          <option value="AXL">AXL</option>
        </select>

        <select id="experience">
          <option value="">Experience</option>
          <option value="first-time">First time</option>
          <option value="some">Some</option>
          <option value="experienced">Experienced</option>
        </select>
      </div>

      <!-- Waivers -->
      <h3>Waivers</h3>
      <label><input type="checkbox" id="liabilityWaiver"> Liability Waiver *</label><br>
      <label><input type="checkbox" id="riskAck"> Risk Acknowledgement *</label><br>

      <label>Photo Permission *</label><br>
      <label><input type="radio" name="photoPermission" value="yes"> Yes</label>
      <label><input type="radio" name="photoPermission" value="no"> No</label>

      <!-- Signature -->
      <h3>Signature</h3>
      <input id="signatureName" placeholder="Full Name" required />
      <input type="date" id="signatureDate" required />

      <br><br>

      <button type="submit" class="submit-btn">Submit Sponsored Registration</button>

    </form>

  </div>
</section>

<script>
document.addEventListener('DOMContentLoaded', () => {

  const form = document.getElementById('registrationForm');

  form.addEventListener('submit', (e) => {
    e.preventDefault();

    const liabilityWaiver = document.getElementById('liabilityWaiver');
    const riskAck = document.getElementById('riskAck');
    const photoPermission = document.querySelector('input[name="photoPermission"]:checked');
    const ageGroupRadio = document.querySelector('input[name="ageGroup"]:checked');

    if (!liabilityWaiver.checked || !riskAck.checked) {
      alert('Please accept waivers');
      return;
    }

    if (!photoPermission) {
      alert('Select photo permission');
      return;
    }

    if (!ageGroupRadio) {
      alert('Select age group');
      return;
    }

    const payload = {
      parent: {
        name: document.getElementById('parentName').value,
        email: document.getElementById('parentEmail').value,
        phone: document.getElementById('parentPhone').value,
        homeTown: document.getElementById('homeTown').value
      },
      player: {
        firstName: document.getElementById('playerFirstName').value,
        lastName: document.getElementById('playerLastName').value,
        dob: document.getElementById('playerDob').value,
        shirtSize: document.getElementById('shirtSize').value,
        experience: document.getElementById('experience').value
      },
      ageGroup: ageGroupRadio.value,
      waivers: {
        liabilityWaiver: liabilityWaiver.checked,
        riskAcknowledgement: riskAck.checked,
        photoPermission: photoPermission.value
      },
      signature: {
        name: document.getElementById('signatureName').value,
        date: document.getElementById('signatureDate').value
      },
      sponsoredRegistration: true,
      sponsoredAmount: 0
    };

    const checkoutPayload = JSON.stringify({
      type: 'registration',
      data: payload
    });

    sessionStorage.setItem('HFF_CHECKOUT_PAYLOAD', checkoutPayload);
    localStorage.setItem('HFF_CHECKOUT_PAYLOAD', checkoutPayload);

    // 🔥 KEY CHANGE HERE
    window.location.replace('loading_sponsored.html?v=' + Date.now());

  });

});
</script>

</body>
</html>
